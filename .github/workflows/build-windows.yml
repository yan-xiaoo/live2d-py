name: Windows-intel📦

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"
    branches: [ main, master, windows-workflow, build-all ]


jobs:
  build:
    name: Build📦 for Windows
    runs-on: windows-latest
    permissions:
      contents: write

    strategy:
      matrix:
        python-version: ['3.9', '3.10.0', '3.11.0', '3.12.0', '3.13', '3.14' ]
        architecture: [ 'x64' ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade setuptools
          python -m pip install wheel

      - name: Build a binary wheel
        run: |
          python setup.py build_ext
          python setup.py bdist_wheel

      - name: Upload screenshots
        if: ${{ matrix.python-version == '3.13' }}
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-windows
          path: package/screenshot_*.png

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-wheel-${{ matrix.python-version }}-${{ matrix.architecture }}
          path: dist/*.whl

      - name: Upload Wheel to Release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          # tag_name: v0.2.2-alpha
          files: |
            dist/*.whl
