name: Windows-intel📦

on:
  push:
    tags:
      - "v*.*.*"
    branches: [ windows-workflow, build-all ]


jobs:
  build-n-publish:
    name: Build📦 for Windows
    runs-on: windows-latest
    permissions:
      contents: write

    strategy:
      matrix:
        python-version: [ '3.10.0', '3.11.0', '3.12.0', '3.13', '3.14' ]
        architecture: [ 'x64' ]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install build deps
        run: |
          python -m pip install --upgrade setuptools
          python -m pip install wheel

      - name: Build a binary wheel
        run: |
          python setup.py build_ext
          python setup.py bdist_wheel

      - name: Test Run (v2, v2cpp, v3)
        if: ${{ matrix.python-version == '3.14' }}
        run: |
          pip install pyside6 pyopengl numpy pillow
          cd package
          python test_run_screenshot.py v2 --model haru --output screenshot_v2.png
          python test_run_screenshot.py v2cpp --model haru --output screenshot_v2cpp.png
          python test_run_screenshot.py v3 --model haru --output screenshot_v3.png

      - name: Upload screenshots
        if: ${{ matrix.python-version == '3.14' }}
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-windows
          path: package/screenshot_*.png

      - name: Install twine
        run: python -m pip install twine

      - name: Publish distribution to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: twine upload dist/* --skip-existing

      - name: Upload Wheel to Release
        uses: softprops/action-gh-release@v2
        with:
          # tag_name: v0.2.2-alpha
          files: |
            dist/*.whl
