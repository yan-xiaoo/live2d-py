name: Linux 📦 (manylinux)

on:
  push:
    tags:
      - "v*.*.*"
    branches: [ manylinux, build-all ]
  workflow_dispatch:

jobs:
  build-manylinux:
    name: Build manylinux wheels
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels in manylinux container
        run: |
          docker run --rm \
            -v $PWD:/work -w /work \
            quay.io/pypa/manylinux_2_28_x86_64 \
            bash -c '
            set -e
            yum install -y mesa-libGL-devel gcc-c++

            # use system GCC 8.5 (matches GLIBC 2.28), not devtoolset GCC 14
            export CC=/usr/bin/gcc CXX=/usr/bin/g++

            # clear stale cmake cache
            rm -rf build/

            # Install cmake once (use cp310 as bootstrap)
            /opt/python/cp310-cp310/bin/pip install cmake
            export PATH="/opt/python/cp310-cp310/bin:$PATH"

            for ver in 10 11 12 13 14; do
              PYBIN="/opt/python/cp3${ver}-cp3${ver}/bin"
              [ -x "$PYBIN/python" ] || continue
              echo "=== Building with $PYBIN/python ==="
              "$PYBIN/pip" install wheel setuptools
              "$PYBIN/python" setup.py bdist_wheel
            done

            # Tag wheels as manylinux
            for whl in dist/*.whl; do
              auditwheel repair "$whl" -w dist/
            done

            # Fix file ownership for host
            chown -R $(stat -c "%u:%g" /work) /work/dist /work/build

            echo "=== Built wheels ==="
            ls dist/
            echo ""
            for whl in dist/*.whl; do
              echo "--- $whl ---"
              auditwheel show "$whl" 2>&1 || true
            done
          '

      - name: Upload wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          python -m pip install twine
          twine upload dist/*.whl --skip-existing
