name: Linux ARM64 📦 (manylinux)

on:
  push:
    tags:
      - "v*.*.*"
    branches: [ manylinux-arm, build-all ]
  workflow_dispatch:

jobs:
  build-manylinux-arm:
    name: Build manylinux wheels (ARM64)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels in manylinux container
        run: |
          docker run --rm \
            -v $PWD:/work -w /work \
            quay.io/pypa/manylinux_2_28_aarch64 \
            bash -c '
            set -e
            yum install -y mesa-libGL-devel gcc-c++

            rm -rf build/

            /opt/python/cp310-cp310/bin/pip install cmake
            export PATH="/opt/python/cp310-cp310/bin:$PATH"

            export CC=/usr/bin/gcc CXX=/usr/bin/g++

            for ver in 10 11 12 13 14; do
              PYBIN="/opt/python/cp3${ver}-cp3${ver}/bin"
              [ -x "$PYBIN/python" ] || continue
              echo "=== Building with $PYBIN/python ==="
              "$PYBIN/pip" install "setuptools<82" wheel
              "$PYBIN/python" setup.py bdist_wheel
            done

            for whl in dist/*.whl; do
              auditwheel repair "$whl" -w dist/ || true
            done
            for whl in dist/*manylinux*.whl; do
              python3 /work/tools/fix_wheel_meta.py "$whl"
            done

            chown -R $(stat -c "%u:%g" /work) /work/dist /work/build

            echo "=== Built wheels ==="
            ls dist/
            for whl in dist/*.whl; do
              auditwheel show "$whl" 2>&1 || true
            done
          '

      - name: Upload wheels to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
